services:
  app:
    build: .
    container_name: tecnofit_app
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - api-network
    command: >
      sh -c "
        mkdir -p public &&
        ./vendor/bin/openapi src -o public/openapi.json &&
        php-fpm
      "

  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - 8000:80
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - api-network
  
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d
    networks:
      - api-network

volumes:
  db_data:

networks:
  api-network: